<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .verification-info {
            background-color: #e8f4fd;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }
        .verification-info h3 {
            margin-top: 0;
            color: #0056b3;
        }
        .loading {
            text-align: center;
            margin: 20px 0;
            display: none;
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>修改密码</h1>
        
        <div id="alert-message" class="alert"></div>
        
        <form id="change-password-form">
            <div class="form-group">
                <label for="old_password">当前密码：</label>
                <input type="password" id="old_password" name="old_password" required>
            </div>
            
            <div class="form-group">
                <label for="new_password">新密码：</label>
                <input type="password" id="new_password" name="new_password" required minlength="6">
            </div>
            
            <div class="form-group">
                <label for="confirm_password">确认新密码：</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
            </div>
            
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>正在进行人脸验证，请正对摄像头...</p>
            </div>
            
            <div class="verification-info" id="verification-info">
                <h3>⚠️ 注意：</h3>
                <p>系统将启动摄像头进行人脸验证，请确保：</p>
                <ul>
                    <li>摄像头已连接且正常工作</li>
                    <li>您正对摄像头，面部清晰可见</li>
                    <li>光线充足，无遮挡</li>
                    <li>保持姿势直到验证完成</li>
                </ul>
            </div>
            
            <button type="submit" class="btn" id="submit-btn">确认修改</button>
        </form>
    </div>

    <script>
        $(document).ready(function() {
            // 表单提交处理
            $('#change-password-form').submit(function(e) {
                e.preventDefault();
                
                // 验证密码一致性
                var newPassword = $('#new_password').val();
                var confirmPassword = $('#confirm_password').val();
                
                if (newPassword !== confirmPassword) {
                    showAlert('新密码不一致，请重新输入', 'error');
                    return;
                }
                
                // 显示验证信息和加载动画
                $('#verification-info').show();
                $('#loading').show();
                $('#submit-btn').prop('disabled', true).text('正在验证...');
                
                // 收集表单数据
                var formData = $(this).serialize();
                
                // 提交AJAX请求
                $.ajax({
                    url: '/user/change_password',
                    type: 'POST',
                    data: formData,
                    success: function(response) {
                        if (response.success) {
                            showAlert(response.message, 'success');
                            // 清空表单
                            $('#change-password-form')[0].reset();
                            // 3秒后跳转到首页
                            setTimeout(function() {
                                window.location.href = '/user/dashboard';
                            }, 3000);
                        } else {
                            showAlert(response.message, 'error');
                        }
                    },
                    error: function(xhr, status, error) {
                        showAlert('请求失败，请重试', 'error');
                        console.error('Error:', error);
                    },
                    complete: function() {
                        // 隐藏加载动画和验证信息
                        $('#loading').hide();
                        $('#verification-info').hide();
                        $('#submit-btn').prop('disabled', false).text('确认修改');
                    }
                });
            });
            
            // 显示提示消息
            function showAlert(message, type) {
                var alertDiv = $('#alert-message');
                alertDiv.removeClass('alert-success alert-error');
                alertDiv.addClass('alert-' + (type === 'success' ? 'success' : 'error'));
                alertDiv.text(message).fadeIn();
                
                // 5秒后自动隐藏
                setTimeout(function() {
                    alertDiv.fadeOut();
                }, 5000);
            }
        });
    </script>
</body>
</html>
